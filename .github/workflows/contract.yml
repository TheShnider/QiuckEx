name: Contract CI

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'app/contract/**'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'app/contract/**'

jobs:
  test:
    name: Test Suite
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app/contract

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: wasm32-unknown-unknown

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "app/contract"

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run tests
        run: cargo test

      - name: Run performance benchmarks
        run: |
          mkdir -p "$GITHUB_WORKSPACE/benchmark-results"
          QUICKEX_BENCH_ARTIFACT_DIR="$GITHUB_WORKSPACE/benchmark-results" cargo test bench_core_lifecycle_costs -- --nocapture --test-threads=1

      - name: Upload performance benchmark results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quickex-contract-performance-benchmarks
          path: benchmark-results/
          if-no-files-found: error
